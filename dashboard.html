<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Quill Rich Text Editor -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  display:flex;
}

/* Sidebar */
.sidebar{
  width:250px;
  height:100vh;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
  padding:25px;
  position:fixed;
  transition:0.3s;
  border-right:1px solid rgba(255,255,255,0.1);
}

.logo{
  font-size:24px;
  font-weight:bold;
  margin-bottom:50px;
  letter-spacing:1px;
  color:#00e676;
}

.nav a{
  display:block;
  padding:14px 12px;
  margin-bottom:12px;
  text-decoration:none;
  color:#ccc;
  font-weight:500;
  border-radius:12px;
  transition:0.3s;
}

.nav a:hover{
  background:#00c6ff;
  color:#111;
  transform:translateX(5px);
}

/* Main Content */
.main{
  margin-left:250px;
  padding:30px;
  width:100%;
  transition:0.3s;
}

/* Topbar */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.topbar h2{
  font-weight:600;
  color:#00e676;
}

.logout-btn{
  background:#ff5252;
  border:none;
  padding:8px 18px;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
  transition:0.3s;
}

.logout-btn:hover{
  background:#ff1744;
  transform:scale(1.05);
}

/* Stats Cards */
.cards{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-bottom:40px;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding:25px;
  border-radius:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.35);
  transition:0.3s;
}

.card:hover{
  transform: translateY(-5px);
}

.card h3{
  font-size:18px;
  margin-bottom:12px;
  color:#00e676;
}

.card p{
  font-size:28px;
  font-weight:bold;
  color:white;
}

/* Form Box */
.form-box{
  background: rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(15px);
  margin-bottom:40px;
}

.form-box h3{
  margin-bottom:20px;
  color:#00e676;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:12px;
  border:none;
  background:#1f1f1f;
  color:white;
  font-size:16px;
}

/* Publish Button */
button.publish{
  background:#00e676;
  border:none;
  padding:14px 25px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
  transition:0.3s;
}

button.publish:hover{
  background:#00c853;
  transform:scale(1.05);
}

/* Quill Editor */
#editor{
  background:white;
  color:black;
  height:280px;
  border-radius:12px;
  margin-bottom:15px;
  padding:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.25);
}

/* Quill Toolbar */
.ql-toolbar.ql-snow{
  border-radius:12px 12px 0 0;
  background:#f3f3f3;
}

/* Post List */
.post-list{
  margin-top:30px;
}

.post-item{
  background: rgba(255,255,255,0.08);
  padding:18px 20px;
  border-radius:15px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 6px 18px rgba(0,0,0,0.3);
  transition:0.3s;
}

.post-item:hover{
  transform:translateY(-3px);
}

.post-item h4{
  color:#00e676;
  font-size:18px;
}

.delete-btn{
  background:#ff5252;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  font-weight:500;
  transition:0.3s;
}

.delete-btn:hover{
  background:#ff1744;
  transform:scale(1.05);
}

/* Responsive */
@media(max-width:768px){
  .sidebar{
    display:none;
  }
  .main{
    margin-left:0;
    padding:20px;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Admin Panel</div>
  <div class="nav">
    <a href="#">Dashboard</a>
    <a href="#">Create Post</a>
    <a href="#">All Posts</a>
  </div>
</div>

<div class="main">

  <div class="topbar">
    <h2>Dashboard Overview</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- Stats Cards -->
  <div class="cards">
    <div class="card">
      <h3>Total Posts</h3>
      <p id="totalPosts">0</p>
    </div>
    <div class="card">
      <h3>Visitors</h3>
      <p>--</p>
    </div>
    <div class="card">
      <h3>Comments</h3>
      <p>--</p>
    </div>
  </div>

  <!-- Create Post Form -->
  <div class="form-box">
    <h3>Create New Post</h3>
    <input type="text" id="title" placeholder="Post Title">
    <input type="text" id="image" placeholder="Image URL">
    <div id="editor"></div>
    <button class="publish" onclick="publish()">Publish Post</button>
  </div>

  <!-- Post List -->
  <div class="post-list" id="posts"></div>

</div>

<!-- Quill JS -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
var quill = new Quill('#editor', { theme: 'snow' });
</script>

</body>
</html>
